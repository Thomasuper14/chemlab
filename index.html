<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemLab 2C</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Nunito',sans-serif;
background: radial-gradient(circle at 20% 20%, #0b1b33, #070B14 60%);
color:#cfefff;
}

header{
text-align:center;
padding:2rem;
}

h1{
font-size:3.5rem;
font-weight:900;
background:linear-gradient(90deg,#00D4FF,#B026FF);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.search{
display:flex;
max-width:700px;
margin:0 auto;
border:1px solid #1f3b57;
border-radius:14px;
overflow:hidden;
}

input{
flex:1;
padding:1rem;
background:#0B1220;
border:none;
color:white;
font-size:1rem;
outline:none;
}

button{
padding:1rem 1.2rem;
background:#00D4FF;
border:none;
font-weight:900;
cursor:pointer;
}

.container{
max-width:1000px;
margin:2rem auto;
padding:1rem;
}

.card{
background:rgba(11,18,32,.6);
backdrop-filter: blur(10px);
border:1px solid rgba(0,212,255,.25);
padding:1.5rem;
border-radius:16px;
margin-top:1rem;
}

.big{
font-size:2.5rem;
font-weight:900;
color:#00D4FF;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:1rem;
margin-top:1rem;
}

.box{
background:#0f1a2b;
border:1px solid #1f3b57;
padding:1rem;
border-radius:12px;
}

.label{font-size:.7rem;color:#6aa6c9;}
.value{font-weight:800;}

.loading{
text-align:center;
color:#00D4FF;
font-weight:800;
}

.error{
color:#ff5c5c;
text-align:center;
margin-top:1rem;
}
</style>
</head>

<body>

<header>
<h1>ChemLab 2C</h1>
<p>Chimica intelligente</p>
</header>

<div class="search">
<input id="q" placeholder="H2SO4, glucosio, Fe2O3..." onkeydown="if(event.key==='Enter')search()">
<button onclick="search()">SCAN</button>
</div>

<div class="container" id="out"></div>

<script>

let lastName = "";
let lastFormula = "";

/* ELEMENTI */
const elements = {
"H": { name:"Idrogeno", mass:1.008 },
"C": { name:"Carbonio", mass:12.01 },
"O": { name:"Ossigeno", mass:16.00 },
"N": { name:"Azoto", mass:14.01 },
"Fe": { name:"Ferro", mass:55.85 },
"Na": { name:"Sodio", mass:22.99 },
"Cl": { name:"Cloro", mass:35.45 },
"Au": { name:"Oro", mass:196.97 }
};

/* MAP ITALIANO */
const map = {
glucosio:"glucose",
acqua:"water",
ferro:"iron",
oro:"gold",
rame:"copper",
argento:"silver",
etanolo:"ethanol",
metano:"methane",
aspirina:"aspirin"
};

/* CID ROBUSTO */
async function cid(name){

let urls = [
`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(name)}/cids/JSON`,
`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${encodeURIComponent(name.toLowerCase())}/cids/JSON`
];

for(let u of urls){
try{
let r = await fetch(u);
if(r.ok){
let j = await r.json();
let id = j?.IdentifierList?.CID?.[0];
if(id) return id;
}
}catch(e){}
}

return null;
}

/* SEARCH */
async function search(){

let q = document.getElementById("q").value.trim();
let out = document.getElementById("out");

if(!q){
out.innerHTML="<div class='error'>Inserisci un composto</div>";
return;
}

out.innerHTML="<div class='loading'>Analisi...</div>";

let term = map[q.toLowerCase()] || q;

/* ELEMENTI */
if(elements[q]){
let el = elements[q];
out.innerHTML=`
<div class="card">
<div class="big">${q}</div>
<div><b>${el.name}</b></div>
<div class="grid">
<div class="box"><div class="label">Massa atomica</div><div class="value">${el.mass}</div></div>
</div>
</div>`;
return;
}

/* PUBCHEM */
let id = await cid(term);

if(!id){
out.innerHTML="<div class='error'>Non trovato</div>";
return;
}

let r = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${id}/property/MolecularFormula,MolecularWeight,IUPACName/JSON`);
let j = await r.json();
let p = j?.PropertyTable?.Properties?.[0];

lastName = p.IUPACName || term;
lastFormula = p.MolecularFormula;

let img = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${id}/PNG`;

out.innerHTML=`
<div class='card'>

<div class='big'>${p.MolecularFormula}</div>
<div><b>${p.IUPACName}</b></div>

<img src="${img}" width="220">

<div class="grid">
<div class="box"><div class="label">Massa</div><div class="value">${p.MolecularWeight}</div></div>
<div class="box"><div class="label">CID</div><div class="value">${id}</div></div>
</div>

</div>
`;

}

</script>

</body>
</html>
